<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TTC Quiz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
background:linear-gradient(270deg,#667eea,#764ba2,#6dd5ed);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

.active{
display:flex;
}

.logo{
width:140px;
margin-bottom:20px;
animation:logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

.card{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:320px;

}

h1{
margin-bottom:10px;
}

input{

margin-top:20px;
padding:12px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;

}

button{

margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:16px;
background:#ff7a18;
color:white;
cursor:pointer;
transition:0.3s;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>


<!-- INTRO -->

<div id="intro" class="screen active">

<img class="logo" src="https://i.ibb.co/dsBdtCwK/Ttc-logo.png">

<h1>Tushar Tuition Classes</h1>

<p>Concept Based Learning</p>

</div>


<!-- NAME SCREEN -->

<div id="nameScreen" class="screen">

<div class="card">

<h2>Enter Your Name</h2>

<input id="name" placeholder="Your name">

<button onclick="saveName()">Continue</button>

</div>

</div>


<!-- WELCOME -->

<div id="welcome" class="screen">

<div class="card">

<h2 id="welcomeText"></h2>

<p>Ready to start today's quiz?</p>

<button onclick="startQuiz()">Start Quiz</button>

</div>

</div>



<script>

let student=""

/* intro timer */

setTimeout(()=>{

document.getElementById("intro").classList.remove("active")
document.getElementById("nameScreen").classList.add("active")

},2500)



function saveName(){

student=document.getElementById("name").value

if(student=="") student="Student"

document.getElementById("welcomeText").innerText="Welcome "+student+" 👋"

document.getElementById("nameScreen").classList.remove("active")
document.getElementById("welcome").classList.add("active")

}



function startQuiz(){

alert("Quiz Starts Here")

}

</script>

</body>
</html>
